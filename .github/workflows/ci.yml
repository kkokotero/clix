name: CI
permissions:
  contents: read

on:
  push:
    branches:
      - main
      - master
  pull_request:
  workflow_dispatch:

jobs:
  build-and-test:
    name: ${{ matrix.os }} / ${{ matrix.build_type }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
          - windows-latest
        build_type:
          - Release

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Show tool versions
        shell: bash
        run: |
          cmake --version
          c++ --version || true
          clang++ --version || true
          g++ --version || true

      - name: Configure
        shell: bash
        run: >
          cmake -S . -B build
          -DCMAKE_BUILD_TYPE=${{ matrix.build_type }}
          -DBUILD_TESTING=ON
          -DCLIX_BUILD_EXAMPLES=ON
          -DCLIX_BUILD_BENCHMARKS=ON

      - name: Build
        shell: bash
        run: cmake --build build --config ${{ matrix.build_type }} --parallel

      - name: Test
        shell: bash
        run: ctest --test-dir build --build-config ${{ matrix.build_type }} --output-on-failure

      - name: Install
        shell: bash
        run: cmake --install build --config ${{ matrix.build_type }} --prefix "$RUNNER_TEMP/clix-install"

  cross-target-header-smoke:
    name: ${{ matrix.name }} header smoke
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: ios-simulator
            os: macos-latest
          - name: android-arm64
            os: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Android SDK
        if: ${{ matrix.name == 'android-arm64' }}
        uses: android-actions/setup-android@v3

      - name: Install Android NDK
        if: ${{ matrix.name == 'android-arm64' }}
        shell: bash
        run: |
          yes | sdkmanager --licenses >/dev/null
          sdkmanager "ndk;27.2.12479018"
          echo "ANDROID_NDK_ROOT=${ANDROID_SDK_ROOT}/ndk/27.2.12479018" >> "${GITHUB_ENV}"

      - name: Compile iOS simulator smoke
        if: ${{ matrix.name == 'ios-simulator' }}
        shell: bash
        run: |
          sdk_path="$(xcrun --sdk iphonesimulator --show-sdk-path)"
          clangxx="$(xcrun --sdk iphonesimulator --find clang++)"
          "${clangxx}" \
            -std=c++17 \
            -stdlib=libc++ \
            -fsyntax-only \
            -isysroot "${sdk_path}" \
            -I"${GITHUB_WORKSPACE}/src" \
            "${GITHUB_WORKSPACE}/tests/platform_smoke.cpp"

      - name: Compile Android NDK smoke
        if: ${{ matrix.name == 'android-arm64' }}
        shell: bash
        run: |
          clangxx="${ANDROID_NDK_ROOT}/toolchains/llvm/prebuilt/linux-x86_64/bin/aarch64-linux-android21-clang++"
          "${clangxx}" \
            -std=c++17 \
            -fsyntax-only \
            -I"${GITHUB_WORKSPACE}/src" \
            "${GITHUB_WORKSPACE}/tests/platform_smoke.cpp"

  vcpkg-smoke-test:
    name: vcpkg smoke test
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Acquire vcpkg
        uses: actions/checkout@v4
        with:
          repository: microsoft/vcpkg
          path: .ci/vcpkg

      - name: Bootstrap vcpkg
        shell: bash
        run: ./.ci/vcpkg/bootstrap-vcpkg.sh

      - name: Create smoke test project
        shell: bash
        run: |
          baseline="$(git -C .ci/vcpkg rev-parse HEAD)"
          project_dir="${RUNNER_TEMP}/clix-vcpkg-smoke"
          mkdir -p "${project_dir}"

          cat > "${project_dir}/vcpkg.json" <<EOF
          {
            "name": "clix-vcpkg-smoke",
            "version-string": "0.0.0",
            "builtin-baseline": "${baseline}",
            "dependencies": [
              "clix"
            ]
          }
          EOF

          cat > "${project_dir}/CMakeLists.txt" <<'EOF'
          cmake_minimum_required(VERSION 3.23)
          project(clix_vcpkg_smoke LANGUAGES CXX)

          find_package(clix CONFIG REQUIRED)

          add_executable(clix_vcpkg_smoke main.cpp)
          target_link_libraries(clix_vcpkg_smoke PRIVATE clix::clix)
          target_compile_features(clix_vcpkg_smoke PRIVATE cxx_std_17)
          EOF

          cat > "${project_dir}/main.cpp" <<'EOF'
          #include <clix/cli.hpp>

          int main(int argc, char** argv) {
              clix::CLI cli("smoke", "0.0.0");
              return cli.run(argc, argv);
          }
          EOF

          echo "CLIX_VCPKG_SMOKE_DIR=${project_dir}" >> "${GITHUB_ENV}"

      - name: Configure smoke test project
        shell: bash
        run: >
          cmake -S "${CLIX_VCPKG_SMOKE_DIR}" -B "${CLIX_VCPKG_SMOKE_DIR}/build"
          -DCMAKE_BUILD_TYPE=Release
          -DCMAKE_TOOLCHAIN_FILE="${GITHUB_WORKSPACE}/.ci/vcpkg/scripts/buildsystems/vcpkg.cmake"
          -DVCPKG_OVERLAY_PORTS="${GITHUB_WORKSPACE}/vcpkg/ports"

      - name: Build smoke test project
        shell: bash
        run: cmake --build "${CLIX_VCPKG_SMOKE_DIR}/build" --parallel
