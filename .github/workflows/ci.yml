name: CI

on:
  push:
    branches:
      - main
      - master
  pull_request:
  workflow_dispatch:

jobs:
  build-and-test:
    name: ${{ matrix.os }} / ${{ matrix.build_type }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
          - windows-latest
        build_type:
          - Release

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Show tool versions
        shell: bash
        run: |
          cmake --version
          c++ --version || true
          clang++ --version || true
          g++ --version || true

      - name: Configure
        shell: bash
        run: >
          cmake -S . -B build
          -DCMAKE_BUILD_TYPE=${{ matrix.build_type }}
          -DBUILD_TESTING=ON
          -DCLIX_BUILD_EXAMPLES=ON
          -DCLIX_BUILD_BENCHMARKS=ON

      - name: Build
        shell: bash
        run: cmake --build build --config ${{ matrix.build_type }} --parallel

      - name: Test
        shell: bash
        run: ctest --test-dir build --build-config ${{ matrix.build_type }} --output-on-failure

      - name: Install
        shell: bash
        run: cmake --install build --config ${{ matrix.build_type }} --prefix "$RUNNER_TEMP/clix-install"
